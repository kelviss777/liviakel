<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#744b61">
    <title>Nosso Casamento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/global.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    <link rel="stylesheet" href="style.css">
    <script src="../../js/supabase.js" defer></script>
    <script src="../../js/app.js" defer></script>
    <script src="../../components/sidebar.js" defer></script>
    <script src="main.js" defer></script>
</head>
<body data-page="tarefas">
    <div class="app-shell">
        <aside class="sidebar" id="sidebar-container"></aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Planejamento do casamento</p>
                    <h1 id="page-title">Checklist</h1>
                </div>
                <button class="button button-ghost" id="open-settings" type="button">Editar casamento</button>
            </header>

            <section class="page active" id="tarefas" aria-labelledby="page-title">
                <div class="section-toolbar">
                    <div><p class="section-description">Transforme os preparativos em passos pequenos e claros.</p></div>
                    <button class="button button-primary" data-toggle-form="task-form-card" type="button">+ Nova tarefa</button>
                </div>

                <article class="form-card hidden" id="task-form-card">
                    <form id="task-form">
                        <div class="field field-grow"><label for="task-name">Tarefa</label><input id="task-name" name="name" required placeholder="Ex.: Escolher o fotógrafo"></div>
                        <div class="field"><label for="task-category">Categoria</label><select id="task-category" name="category"><option>Cerimônia</option><option>Festa</option><option>Fornecedores</option><option>Documentos</option><option>Pessoal</option></select></div>
                        <div class="field"><label for="task-date">Prazo</label><input id="task-date" name="date" type="date"></div>
                        <button class="button button-primary form-submit" type="submit">Salvar</button>
                    </form>
                </article>

                <article class="panel table-panel">
                    <div class="filter-tabs" id="task-filters">
                        <button class="active" data-filter="all" type="button">Todas</button>
                        <button data-filter="pending" type="button">Pendentes</button>
                        <button data-filter="done" type="button">Concluídas</button>
                    </div>
                    <div class="data-list task-list" id="task-list"></div>
                </article>
            </section>
        </main>
    </div>
</body>
</html>
